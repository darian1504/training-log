      <div style={{ flex:1, height:22, display:'flex', alignItems:'center', justifyContent:'center' }}>
        <span style={{ fontFamily:'-apple-system,"SF Pro",system-ui', fontWeight:590, fontSize:17, lineHeight:'22px', color:c }}>9:41</span>

        <svg width="27" height="13" viewBox="0 0 27 13"><rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke={c} strokeOpacity="0.35" fill="none"/><rect x="2" y="2" width="20" height="9" rx="2" fill={c}/><path d="M25 4.5V8.5C25.8 8.2 26.5 7.2 26.5 6.5C26.5 5.8 25.8 4.8 25 4.5Z" fill={c} fillOpacity="0.4"/></svg>

}
function IOSDevice({ children, width=390, height=844, dark=false }) {
  return (
    <div style={{ width, height, borderRadius:48, overflow:'hidden', position:'relative', background:dark?'#000':'#F2F2F7', boxShadow:'0 40px 80px rgba(0,0,0,0.18),0 0 0 1px rgba(0,0,0,0.12)', WebkitFontSmoothing:'antialiased' }}>
      <div style={{ position:'absolute', top:11, left:'50%', transform:'translateX(-50%)', width:126, height:37, borderRadius:24, background:'#000', zIndex:50 }} />
      <div style={{ position:'absolute', top:0, left:0, right:0, zIndex:10 }}><IOSStatusBar dark={dark} /></div>
      <div style={{ height:'100%', display:'flex', flexDirection:'column' }}>
        <div style={{ flex:1, overflow:'auto' }}>{children}</div>
      </div>

Object.assign(window, { IOSDevice, IOSStatusBar });
</script>

<!-- ═══ DATA ═══ -->
<script type="text/babel">
const MUSCLE_GROUPS = ["legs","back","chest","arms","shoulders","abs"];
const MG_COLORS = { legs:"oklch(0.62 0.13 145)", back:"oklch(0.52 0.15 258)", chest:"oklch(0.58 0.17 28)", arms:"oklch(0.56 0.15 305)", shoulders:"oklch(0.68 0.14 70)", abs:"oklch(0.66 0.10 205)" };
const MG_LABEL  = { legs:"Legs", back:"Back", chest:"Chest", arms:"Arms", shoulders:"Shoulders", abs:"Abs" };
const DAY_COLORS = ["oklch(0.52 0.15 258)","oklch(0.55 0.14 145)","oklch(0.58 0.17 28)","oklch(0.72 0.14 85)"];

const EXERCISES = {
  squat:            { id:"squat",            name:"Back Squat",           group:"legs" },
  leg_extension:    { id:"leg_extension",    name:"Leg Extension",        group:"legs" },
  leg_press:        { id:"leg_press",        name:"Leg Press",            group:"legs" },
  hack_squat:       { id:"hack_squat",       name:"Hack Squat",           group:"legs" },
  barbell_squats:   { id:"barbell_squats",   name:"Front Squat",          group:"legs" },
  barbell_lunges:   { id:"barbell_lunges",   name:"Barbell Lunges",       group:"legs" },
  lying_leg_curls:  { id:"lying_leg_curls",  name:"Lying Leg Curls",      group:"legs" },
  calf_raises:      { id:"calf_raises",      name:"Calf Raises",          group:"legs" },
  adductors:        { id:"adductors",        name:"Adductor Machine",     group:"legs" },
  calves_seated:    { id:"calves_seated",    name:"Seated Calf Raises",   group:"legs" },
  lat_pulldown:     { id:"lat_pulldown",     name:"Lat Pulldown",         group:"back" },
  weighted_pullups: { id:"weighted_pullups", name:"Weighted Pull-Ups",    group:"back" },
  deadlift:         { id:"deadlift",         name:"Deadlift",             group:"back" },
  db_row:           { id:"db_row",           name:"Dumbbell Row",         group:"back" },
  pullups_bw:       { id:"pullups_bw",       name:"Pull-Ups",             group:"back" },
  seated_cable_rows:{ id:"seated_cable_rows",name:"Seated Cable Row",     group:"back" },
  rear_delt_fly:    { id:"rear_delt_fly",    name:"Rear Delt Fly",        group:"back" },
  bench_press:      { id:"bench_press",      name:"Bench Press",          group:"chest" },
  weighted_dips:    { id:"weighted_dips",    name:"Weighted Dips",        group:"chest" },
  bench_central:    { id:"bench_central",    name:"Flat Bench Press",     group:"chest" },
  incline_bench:    { id:"incline_bench",    name:"Incline Bench Press",  group:"chest" },
  cable_crossovers: { id:"cable_crossovers", name:"Cable Crossovers",     group:"chest" },
  military_press:   { id:"military_press",   name:"Military Press",       group:"shoulders" },
  lateral_raises:   { id:"lateral_raises",   name:"Lateral Raises",       group:"shoulders" },
  face_pulls:       { id:"face_pulls",       name:"Face Pulls",           group:"shoulders" },
  skullcrusher:     { id:"skullcrusher",     name:"Skullcrusher",         group:"arms" },
  hammer_curl:      { id:"hammer_curl",      name:"Hammer Curl",          group:"arms" },
  triceps_pushdowns:{ id:"triceps_pushdowns",name:"Triceps Pushdowns",    group:"arms" },
  ez_bar_curls:     { id:"ez_bar_curls",     name:"EZ Bar Curl",          group:"arms" },
  abs:              { id:"abs",              name:"Abs",                  group:"abs" },
};

const SPLITS = {
  fullBody: {
    label: "Full Body",
    days: [
      { title:"Full Body A", sub:"Legs & pull compound",   main:["squat","weighted_pullups"],    other:["leg_extension","lat_pulldown","abs"] },
      { title:"Full Body B", sub:"Press & row",             main:["bench_press","db_row"],         other:["military_press","skullcrusher","hammer_curl"] },
      { title:"Full Body C", sub:"Squat & push",            main:["barbell_squats","weighted_dips"],other:["leg_press","adductors","calves_seated"] },
      { title:"Full Body D", sub:"Hinge & press",           main:["deadlift","bench_central"],     other:["abs","lateral_raises","ez_bar_curls","triceps_pushdowns"] },
    ],
  },
  pushPull: {
    label: "Push / Pull",
    days: [
      { title:"Pull A", sub:"Back & biceps",           main:["weighted_pullups","deadlift"],    other:["lat_pulldown","db_row","hammer_curl"] },
      { title:"Push A", sub:"Chest & shoulders",       main:["bench_press","military_press"],   other:["weighted_dips","lateral_raises","triceps_pushdowns"] },
      { title:"Pull B", sub:"Back & arms",             main:["deadlift","seated_cable_rows"],   other:["pullups_bw","rear_delt_fly","ez_bar_curls"] },
      { title:"Push B", sub:"Press & chest",           main:["incline_bench","weighted_dips"],  other:["cable_crossovers","face_pulls","skullcrusher"] },
    ],
  },
  upperLower: {
    label: "Upper / Lower",
    days: [
      { title:"Upper A", sub:"Horizontal push & pull", main:["bench_press","weighted_pullups"], other:["military_press","db_row","lateral_raises"] },
      { title:"Lower A", sub:"Quad focus",             main:["squat","leg_press"],              other:["leg_extension","calf_raises","adductors"] },
      { title:"Upper B", sub:"Vertical press & pull",  main:["military_press","lat_pulldown"],  other:["incline_bench","seated_cable_rows","skullcrusher","hammer_curl"] },
      { title:"Lower B", sub:"Posterior chain",        main:["deadlift","hack_squat"],          other:["lying_leg_curls","calves_seated","abs"] },
    ],
  },
};

function exerciseById(id) { return EXERCISES[id] ?? { id, name:id, group:"legs" }; }

function getWeeklyTargets(splitKey) {
  const t = {}; MUSCLE_GROUPS.forEach(g => t[g] = 0);
  SPLITS[splitKey].days.forEach(d => [...d.main, ...d.other].forEach(id => {
    const ex = exerciseById(id); if (ex.group) t[ex.group]++;
  }));
  return t;
}

Object.assign(window, { MUSCLE_GROUPS, MG_COLORS, MG_LABEL, DAY_COLORS, EXERCISES, SPLITS, exerciseById, getWeeklyTargets });
</script>

<!-- ═══ COMPONENTS ═══ -->
<script type="text/babel">
function RingStack({ progress, targets, size=260, strokeWidth=9, gap=3 }) {
  const center = size / 2, outerR = center - strokeWidth / 2 - 2;
  const total = Object.values(targets).reduce((a,b)=>a+b,0) || 1;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ display:"block" }}>
      {MUSCLE_GROUPS.map((g,i) => {
        const r = outerR - i*(strokeWidth+gap);
        const c = 2*Math.PI*r;
        const done = Math.min(1, (progress[g]||0) / Math.max(1, targets[g]||1));
        return (
          <g key={g}>
            <circle cx={center} cy={center} r={r} fill="none" stroke="currentColor" strokeOpacity="0.08" strokeWidth={strokeWidth}/>
            <circle cx={center} cy={center} r={r} fill="none" stroke={MG_COLORS[g]} strokeWidth={strokeWidth} strokeLinecap="round"
              strokeDasharray={`${c*done} ${c}`} transform={`rotate(-90 ${center} ${center})`}
              style={{ transition:"stroke-dasharray 700ms cubic-bezier(.2,.8,.2,1)" }}/>
          </g>
        );
      })}
    </svg>
  );
}

function GroupKey({ progress, targets }) {
  return (
    <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:"6px 14px", fontFamily:"var(--font-mono)", fontSize:10.5, letterSpacing:0.06, textTransform:"uppercase" }}>
      {MUSCLE_GROUPS.map(g => (
        <div key={g} style={{ display:"flex", alignItems:"center", gap:6, color:"var(--ink-60)" }}>
          <span style={{ width:6, height:6, borderRadius:999, background:MG_COLORS[g], flexShrink:0 }}/>
          <span style={{ flex:1, color:"var(--ink)" }}>{MG_LABEL[g]}</span>
          <span style={{ fontVariantNumeric:"tabular-nums" }}>{progress[g]||0}<span style={{ opacity:0.5 }}>/{targets[g]||0}</span></span>
        </div>
      ))}
    </div>
  );
}

function ExerciseRow({ ex, checked, onToggle, dashed=false, isMain=false }) {
  return (
    <button onClick={onToggle} style={{
      width:"100%", textAlign:"left", padding:"13px 2px", background:"transparent", border:"none",
      borderTop: dashed ? "1px dashed var(--rule)" : "1px solid var(--rule)",
      cursor:"pointer", display:"flex", alignItems:"center", gap:14, fontFamily:"var(--font-body)",
    }}>
      <span style={{
        width:22, height:22, borderRadius:5, flexShrink:0, transition:"all 180ms",
        border: checked ? "none" : `1.5px solid ${isMain ? MG_COLORS[ex.group] : "var(--ink-30)"}`,
        background: checked ? MG_COLORS[ex.group] : "transparent",
        display:"flex", alignItems:"center", justifyContent:"center",
      }}>
        {checked && <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6.5l2.5 2.5L10 3.5" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>}
      </span>
      <div style={{ flex:1, minWidth:0 }}>
        <div style={{
          fontFamily:"var(--font-display)", fontSize: isMain ? 21 : 18, letterSpacing:-0.2,
          color: checked ? "var(--ink-60)" : "var(--ink)",
          textDecoration: checked ? "line-through" : "none", textDecorationThickness:"1px", lineHeight:1.1,
          fontWeight: isMain ? 400 : 400,
        }}>{ex.name}</div>
        <div style={{ fontFamily:"var(--font-mono)", fontSize:10, letterSpacing:0.08, color:"var(--ink-60)", textTransform:"uppercase", marginTop:3, display:"flex", gap:8, alignItems:"center" }}>
          <span style={{ color:MG_COLORS[ex.group] }}>◆ {MG_LABEL[ex.group]}</span>
          {isMain && <span style={{ color:"var(--ink-30)", letterSpacing:0.12 }}>· MAIN</span>}
          {dashed && <span style={{ color:"var(--ink-30)" }}>· ADDED</span>}
        </div>
      </div>
    </button>
  );
}

function Rule({ label, style={} }) {
  return (
    <div style={{ display:"flex", alignItems:"center", gap:10, fontFamily:"var(--font-mono)", fontSize:10, letterSpacing:0.14, textTransform:"uppercase", color:"var(--ink-60)", margin:"20px 0 10px", ...style }}>
      <span style={{ whiteSpace:"nowrap" }}>{label}</span>
      <span style={{ flex:1, height:1, background:"var(--rule)" }}/>
    </div>
  );
}

function DayCard({ day, plan, dayColor, completed, total, isCurrent, isDone, onClick }) {
  const pct = total ? completed/total : 0;
  return (
    <button onClick={onClick} style={{
      textAlign:"left", cursor:"pointer",
      background: isCurrent ? "var(--ink)" : "transparent",
      color: isCurrent ? "var(--paper)" : "var(--ink)",
      border: isCurrent ? "1px solid var(--ink)" : "1px solid var(--rule)",
      borderRadius:0, padding:"14px 14px 16px",
      display:"flex", flexDirection:"column", gap:4, fontFamily:"var(--font-body)",
    }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
        <div style={{ display:"flex", alignItems:"center", gap:8 }}>
          <span style={{ width:10, height:10, borderRadius:999, background:dayColor, flexShrink:0 }}/>
          <div style={{ fontFamily:"var(--font-mono)", fontSize:9.5, letterSpacing:0.18, textTransform:"uppercase", color: isCurrent?"rgba(255,255,255,0.6)":"var(--ink-60)" }}>Day {day}</div>
        </div>
        {isDone && <span style={{ fontFamily:"var(--font-mono)", fontSize:9, letterSpacing:0.18, textTransform:"uppercase", color: isCurrent?"rgba(255,255,255,0.7)":"var(--accent)", border:`1px solid ${isCurrent?"rgba(255,255,255,0.35)":"var(--accent)"}`, borderRadius:2, padding:"2px 5px" }}>Done</span>}
        {!isDone && isCurrent && <span style={{ fontFamily:"var(--font-mono)", fontSize:9, letterSpacing:0.18, textTransform:"uppercase", color:"var(--paper)", border:"1px solid rgba(255,255,255,0.4)", borderRadius:2, padding:"2px 5px" }}>Today</span>}
      </div>
      <div style={{ fontFamily:"var(--font-display)", fontSize:15, letterSpacing:-0.1, lineHeight:1.15, marginTop:6 }}>{plan.title}</div>
      <div style={{ fontFamily:"var(--font-mono)", fontSize:10, letterSpacing:0.08, textTransform:"uppercase", color: isCurrent?"rgba(255,255,255,0.6)":"var(--ink-60)", marginTop:2 }}>{plan.main.map(id=>exerciseById(id).name).join(" · ")}</div>
      <div style={{ height:2, background: isCurrent?"rgba(255,255,255,0.18)":"var(--rule)", marginTop:10, position:"relative" }}>
        <div style={{ position:"absolute", left:0, top:0, bottom:0, width:`${pct*100}%`, background: isCurrent?"var(--paper)":"var(--accent)", transition:"width 400ms ease" }}/>
      </div>
      <div style={{ fontFamily:"var(--font-mono)", fontSize:9.5, letterSpacing:0.08, textTransform:"uppercase", color: isCurrent?"rgba(255,255,255,0.5)":"var(--ink-60)", marginTop:2 }}>{completed}/{total} · {Math.round(pct*100)}%</div>
    </button>
  );
}

Object.assign(window, { RingStack, GroupKey, ExerciseRow, Rule, DayCard });
</script>

<!-- ═══ SCREENS ═══ -->
<script type="text/babel">
const { useState, useEffect } = React;

function computeProgress(completions) {
  const p = {}; MUSCLE_GROUPS.forEach(g => p[g]=0);
  completions.forEach(c => { const ex=exerciseById(c.id); if(ex.group) p[ex.group]++; });
  return p;
}

// ── Dashboard ──
function Dashboard({ state, dispatch, navigate }) {
  const { activeSplit, completions, completedDays } = state;
  const splitData = SPLITS[activeSplit];
  const splitCompletions = completions[activeSplit] || [];
  const splitCompletedDays = completedDays[activeSplit] || [];
  const progress = computeProgress(splitCompletions);
  const targets = getWeeklyTargets(activeSplit);
  const totalDone = Object.values(progress).reduce((a,b)=>a+b,0);
  const totalTarget = Object.values(targets).reduce((a,b)=>a+b,0);

  const today = new Date();
  const weekday = ["SUN","MON","TUE","WED","THU","FRI","SAT"][today.getDay()];
  const dateStr = `${weekday} · ${today.toLocaleDateString("en-US",{month:"short",day:"numeric"}).toUpperCase()}`;

  // Next day to do = first day not yet marked complete
  let currentDay = splitData.days.length;
  for (let i=0; i<splitData.days.length; i++) {
    if (!splitCompletedDays.includes(i+1)) { currentDay = i+1; break; }
  }

  return (
    <div style={{ padding:"8px 24px 100px", fontFamily:"var(--font-body)", color:"var(--ink)" }}>

      {/* Masthead */}
      <div style={{ paddingTop:8 }}>
        <div style={{ fontFamily:"var(--font-mono)", fontSize:10, letterSpacing:0.18, textTransform:"uppercase", color:"var(--ink-60)" }}>{dateStr}</div>
        <div style={{ fontFamily:"var(--font-display)", fontSize:42, lineHeight:0.95, letterSpacing:-0.035, marginTop:10, fontWeight:400 }}>
          <span style={{ fontStyle:"italic" }}>Training</span> Log
        </div>
      </div>

      {/* Split toggle */}
      <div style={{ display:"flex", gap:6, marginTop:16 }}>
        {Object.entries(SPLITS).map(([key, s]) => (
          <button key={key} onClick={() => dispatch({ type:"SET_SPLIT", split:key })}
            style={{
              flex:1, fontFamily:"var(--font-mono)", fontSize:9.5, letterSpacing:0.12,
              textTransform:"uppercase", padding:"9px 4px",
              background: activeSplit===key ? "var(--ink)" : "transparent",
              color: activeSplit===key ? "var(--paper)" : "var(--ink)",
              border:"1px solid var(--ink)", borderRadius:0, cursor:"pointer",
              transition:"all 150ms",
            }}>{s.label}</button>
        ))}
      </div>

      {/* Ring Stack */}
      <div style={{ marginTop:28, display:"flex", justifyContent:"center" }}>
        <div style={{ position:"relative", width:260, height:260 }}>
          <RingStack progress={progress} targets={targets} size={260} strokeWidth={9} gap={3}/>
          <div style={{ position:"absolute", inset:0, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", textAlign:"center" }}>
            <div style={{ fontFamily:"var(--font-mono)", fontSize:9.5, letterSpacing:0.2, textTransform:"uppercase", color:"var(--ink-60)" }}>Week Volume</div>
            <div style={{ fontFamily:"var(--font-display)", fontSize:68, lineHeight:0.85, letterSpacing:-0.05, marginTop:8, fontVariantNumeric:"tabular-nums", fontWeight:400 }}>{totalDone}</div>
            <div style={{ fontFamily:"var(--font-mono)", fontSize:10, letterSpacing:0.12, color:"var(--ink-60)", marginTop:2 }}>of {totalTarget} sets</div>
          </div>
        </div>
      </div>

      {/* Group key */}
      <div style={{ marginTop:20 }}><GroupKey progress={progress} targets={targets}/></div>

      {/* Day cards */}
      <Rule label={`${splitData.label} · ${splitCompletedDays.length < splitData.days.length ? "Day "+currentDay+" on deck" : "Week Complete"}`}/>
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
        {splitData.days.map((plan, i) => {
          const d = i+1;
          const dayComp = splitCompletions.filter(c=>c.day===d && c.slot<1000).length;
          const dayExtra = splitCompletions.filter(c=>c.day===d && c.slot>=1000).length;
          const total = plan.main.length + plan.other.length + dayExtra;
          const isDone = splitCompletedDays.includes(d);
          return (
            <DayCard key={d} day={d} plan={plan} dayColor={DAY_COLORS[i]}
              completed={dayComp+dayExtra} total={total}
              isCurrent={d===currentDay && !isDone} isDone={isDone}
              onClick={() => navigate({ screen:"day", dayId:d })}/>
          );
        })}
      </div>

      {/* Volume bars */}
      <Rule label="Volume By Group"/>
      <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
        {MUSCLE_GROUPS.map(g => {
          const target = targets[g] || 0;
          const done = progress[g] || 0;
          const pct = target ? done/target : 0;
          return (
            <div key={g}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"baseline" }}>
                <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                  <span style={{ width:8, height:8, borderRadius:999, background:MG_COLORS[g] }}/>
                  <span style={{ fontFamily:"var(--font-display)", fontSize:16, letterSpacing:-0.1 }}>{MG_LABEL[g]}</span>
                </div>
                <div style={{ fontFamily:"var(--font-mono)", fontSize:11, letterSpacing:0.08, color:"var(--ink-60)", fontVariantNumeric:"tabular-nums" }}>
                  {done}/{target}
                  <span style={{ marginLeft:8, color: pct>=1?"var(--success)":"var(--accent)" }}>{pct>=1?"DONE":"LAGGING"}</span>
                </div>
              </div>
              <div style={{ height:5, background:"var(--rule)", marginTop:5, position:"relative" }}>
                <div style={{ position:"absolute", inset:0, width:`${Math.min(1,pct)*100}%`, background:MG_COLORS[g], transition:"width 500ms ease" }}/>
              </div>
            </div>
          );
        })}
      </div>

      {/* Footer */}
      <div style={{ marginTop:28, paddingTop:14, borderTop:"1px solid var(--ink)", display:"flex", justifyContent:"flex-end" }}>
        <span onClick={() => dispatch({ type:"RESET_SPLIT" })} style={{ fontFamily:"var(--font-mono)", fontSize:9.5, letterSpacing:0.18, textTransform:"uppercase", color:"var(--ink-60)", cursor:"pointer", borderBottom:"1px solid var(--ink-60)" }}>Reset Week</span>
      </div>
    </div>
  );
}

// ── Day Screen ──
function DayScreen({ state, dispatch, navigate, dayId }) {
  const { activeSplit, completions, completedDays } = state;
  const splitData = SPLITS[activeSplit];
  const plan = splitData.days[dayId-1];
  const splitCompletions = completions[activeSplit] || [];
  const splitCompletedDays = completedDays[activeSplit] || [];

  const plannedDone = new Set(splitCompletions.filter(c=>c.day===dayId && c.slot<1000).map(c=>c.slot));
  const extras = splitCompletions.filter(c=>c.day===dayId && c.slot>=1000).sort((a,b)=>a.slot-b.slot);
  const extraIds = new Set(extras.map(c=>c.id));

  const allIds = [...plan.main, ...plan.other];
  const totalCount = allIds.length + extras.length;
  const doneCount = plannedDone.size + extras.length;
  const pct = totalCount ? doneCount/totalCount : 0;
  const isDone = splitCompletedDays.includes(dayId);

  // Catalog: exercises NOT in today's plan
  const todaySet = new Set(allIds);
  const catalog = {};
  MUSCLE_GROUPS.forEach(g => catalog[g]=[]);
  Object.values(EXERCISES).forEach(ex => { if (!todaySet.has(ex.id)) catalog[ex.group].push(ex); });

  return (
    <div style={{ padding:"8px 24px 120px", fontFamily:"var(--font-body)", color:"var(--ink)" }}>

      {/* Header */}
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", paddingTop:4 }}>
        <button onClick={() => navigate({ screen:"home" })} style={{
          background:"var(--paper)", cursor:"pointer", border:"1px solid var(--ink)",
          fontFamily:"var(--font-mono)", fontSize:10.5, letterSpacing:0.16,
          textTransform:"uppercase", color:"var(--ink)", padding:"6px 10px",
        }}>← Back to Log</button>
        <div style={{ display:"flex", gap:8, fontFamily:"var(--font-mono)", fontSize:10.5, letterSpacing:0.14, textTransform:"uppercase", color:"var(--ink-60)" }}>
          {dayId>1 && <span onClick={()=>navigate({screen:"day",dayId:dayId-1})} style={{ cursor:"pointer" }}>‹ Prev</span>}
          {dayId<splitData.days.length && <span onClick={()=>navigate({screen:"day",dayId:dayId+1})} style={{ cursor:"pointer" }}>Next ›</span>}
        </div>
      </div>

      {/* Folio */}
      <div style={{ marginTop:16, display:"flex", alignItems:"flex-end", gap:14 }}>
        <div style={{ fontFamily:"var(--font-display)", fontSize:130, lineHeight:0.82, letterSpacing:-0.06, fontVariantNumeric:"tabular-nums", fontWeight:400, fontStyle:"italic", color:DAY_COLORS[dayId-1] }}>{dayId}</div>
        <div style={{ paddingBottom:10, flex:1 }}>
          <div style={{ fontFamily:"var(--font-mono)", fontSize:10, letterSpacing:0.18, textTransform:"uppercase", color:"var(--ink-60)" }}>Day {dayId} · {SPLITS[activeSplit].label}</div>
          <div style={{ fontFamily:"var(--font-display)", fontSize:22, letterSpacing:-0.15, marginTop:4, lineHeight:1.1 }}>{plan.title}</div>
          <div style={{ fontFamily:"var(--font-body)", fontSize:12.5, color:"var(--ink-60)", marginTop:3, fontStyle:"italic" }}>{plan.sub}</div>
        </div>
      </div>

      {/* Progress bar */}
      <div style={{ marginTop:14, display:"flex", alignItems:"center", gap:12 }}>
        <div style={{ flex:1, height:2, background:"var(--rule)", position:"relative" }}>
          <div style={{ position:"absolute", inset:0, width:`${pct*100}%`, background:"var(--ink)", transition:"width 400ms ease" }}/>
        </div>
        <div style={{ fontFamily:"var(--font-mono)", fontSize:11, letterSpacing:0.1, fontVariantNumeric:"tabular-nums" }}>{doneCount}/{totalCount}</div>
      </div>

      {/* Main exercises */}
      <Rule label="Main"/>
      <div>
        {plan.main.map((id, slot) => {
          const ex = exerciseById(id);
          return <ExerciseRow key={`m-${slot}`} ex={ex} isMain checked={plannedDone.has(slot)}
            onToggle={() => dispatch({ type: plannedDone.has(slot)?"UNCHECK":"CHECK", split:activeSplit, day:dayId, slot, id })}/>;
        })}
      </div>

      {/* Other exercises */}
      <Rule label="Accessory"/>
      <div>
        {plan.other.map((id, i) => {
          const slot = plan.main.length + i;
          const ex = exerciseById(id);
          return <ExerciseRow key={`o-${i}`} ex={ex} checked={plannedDone.has(slot)}
            onToggle={() => dispatch({ type: plannedDone.has(slot)?"UNCHECK":"CHECK", split:activeSplit, day:dayId, slot, id })}/>;
        })}
        {extras.map(c => (
          <ExerciseRow key={`e-${c.slot}`} ex={exerciseById(c.id)} checked dashed
            onToggle={() => dispatch({ type:"REMOVE_EXTRA", split:activeSplit, day:dayId, slot:c.slot })}/>
        ))}
        <div style={{ borderTop:"1px solid var(--ink)" }}/>
      </div>

      {/* Catalog */}
      <Rule label="Catalog · Tap to Add"/>
      <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
        {MUSCLE_GROUPS.map(g => {
          const list = catalog[g]; if(!list.length) return null;
          return (
            <div key={g}>
              <div style={{ fontFamily:"var(--font-mono)", fontSize:10, letterSpacing:0.16, textTransform:"uppercase", display:"flex", alignItems:"center", gap:6, color:"var(--ink)", marginBottom:5 }}>
                <span style={{ width:6,height:6,borderRadius:999,background:MG_COLORS[g] }}/>{MG_LABEL[g]}
              </div>
              <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
                {list.map(ex => {
                  const checked = extraIds.has(ex.id);
                  return (
                    <button key={ex.id} onClick={() => dispatch({ type:checked?"REMOVE_EXTRA_BY_ID":"ADD_EXTRA", split:activeSplit, day:dayId, id:ex.id })}
                      style={{ fontFamily:"var(--font-body)", fontSize:12.5, padding:"5px 10px", background:checked?"var(--ink)":"transparent", color:checked?"var(--paper)":"var(--ink)", border:"1px solid var(--ink)", borderRadius:0, cursor:"pointer" }}>
                      {checked?"✓ ":"+ "}{ex.name}
                    </button>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>

      {/* Complete Day button */}
      <div style={{ marginTop:32, display:"flex", gap:10 }}>
        {!isDone ? (
          <button onClick={() => { dispatch({ type:"COMPLETE_DAY", split:activeSplit, day:dayId }); navigate({ screen:"home" }); }}
            style={{
              flex:1, fontFamily:"var(--font-mono)", fontSize:11.5, letterSpacing:0.16,
              textTransform:"uppercase", padding:"16px",
              background:"var(--ink)", color:"var(--paper)",
              border:"1px solid var(--ink)", borderRadius:0, cursor:"pointer",
            }}>
            ✓ Complete Day {dayId}
          </button>
        ) : (
          <div style={{ flex:1, fontFamily:"var(--font-mono)", fontSize:11, letterSpacing:0.16, textTransform:"uppercase", padding:"16px", background:"var(--accent)", color:"#fff", textAlign:"center" }}>
            Day {dayId} Done
          </div>
        )}
        <button onClick={() => dispatch({ type:"RESET_DAY", split:activeSplit, day:dayId })}
          style={{ fontFamily:"var(--font-mono)", fontSize:11, letterSpacing:0.12, textTransform:"uppercase", padding:"16px 14px", background:"transparent", color:"var(--ink)", border:"1px solid var(--rule)", borderRadius:0, cursor:"pointer" }}>
          Reset
        </button>
      </div>
    </div>
  );
}

Object.assign(window, { Dashboard, DayScreen, computeProgress });
</script>

<!-- ═══ APP ═══ -->
<script type="text/babel">
const { useReducer, useEffect: useEffectApp, useState: useStateApp } = React;

const ACCENT_CHOICES = { vermilion:"oklch(0.58 0.20 28)", ink:"oklch(0.22 0.02 260)", olive:"oklch(0.55 0.11 115)", cobalt:"oklch(0.48 0.17 258)" };
const VARIANTS = {
  paper: { paper:"oklch(0.968 0.008 78)", ink:"oklch(0.18 0.015 60)", ink60:"oklch(0.45 0.012 60)", ink30:"oklch(0.72 0.008 60)", rule:"oklch(0.88 0.01 75)", accentTint:"oklch(0.95 0.03 28 / 0.6)" },
  ink:   { paper:"oklch(0.16 0.012 260)", ink:"oklch(0.95 0.008 80)", ink60:"oklch(0.68 0.012 80)", ink30:"oklch(0.42 0.012 80)", rule:"oklch(0.28 0.012 260)", accentTint:"oklch(0.22 0.04 28 / 0.5)" },
  court: { paper:"oklch(0.94 0.015 95)",  ink:"oklch(0.22 0.04 160)", ink60:"oklch(0.48 0.03 160)", ink30:"oklch(0.72 0.015 160)", rule:"oklch(0.82 0.02 95)", accentTint:"oklch(0.92 0.04 28 / 0.6)" },
};
const TYPE_PAIRS = {
  "serif-geist": { display:`"Instrument Serif","Times New Roman",serif`, body:`"Geist","Helvetica Neue",system-ui,sans-serif`, mono:`"Geist Mono",ui-monospace,monospace` },
  "editorial":   { display:`"EB Garamond",Georgia,serif`, body:`"EB Garamond",Georgia,serif`, mono:`"IBM Plex Mono",ui-monospace,monospace` },
};

const EMPTY_SPLITS = { fullBody:[], pushPull:[], upperLower:[] };
const INITIAL_STATE = {
  activeSplit: "fullBody",
  completions:   { ...EMPTY_SPLITS },
  completedDays: { ...EMPTY_SPLITS },
};

function reducer(state, action) {
  const split = action.split || state.activeSplit;
  const sc = state.completions[split] || [];
  const sd = state.completedDays[split] || [];

  switch(action.type) {
    case "SET_SPLIT":
      return { ...state, activeSplit: action.split };

    case "CHECK":
      if (sc.some(c=>c.day===action.day && c.slot===action.slot)) return state;
      return { ...state, completions: { ...state.completions, [split]:[...sc,{day:action.day,slot:action.slot,id:action.id}] }};

    case "UNCHECK":
      return { ...state, completions: { ...state.completions, [split]:sc.filter(c=>!(c.day===action.day&&c.slot===action.slot)) }};

    case "ADD_EXTRA": {
      const used = sc.filter(c=>c.day===action.day&&c.slot>=1000).map(c=>c.slot);
      let slot=1000; while(used.includes(slot)) slot++;
      return { ...state, completions: { ...state.completions, [split]:[...sc,{day:action.day,slot,id:action.id}] }};
    }
    case "REMOVE_EXTRA":
      return { ...state, completions: { ...state.completions, [split]:sc.filter(c=>!(c.day===action.day&&c.slot===action.slot)) }};

    case "REMOVE_EXTRA_BY_ID":
      return { ...state, completions: { ...state.completions, [split]:sc.filter(c=>!(c.day===action.day&&c.slot>=1000&&c.id===action.id)) }};

    case "COMPLETE_DAY": {
      const days = sd.includes(action.day) ? sd : [...sd, action.day];
      const totalDays = SPLITS[split].days.length;
      if (days.length >= totalDays) {
        // Week complete — reset this split
        return { ...state,
          completions:   { ...state.completions,   [split]:[] },
          completedDays: { ...state.completedDays, [split]:[] },
        };
      }
      return { ...state, completedDays: { ...state.completedDays, [split]:days } };
    }
    case "RESET_DAY":
      return { ...state,
        completions:   { ...state.completions,   [split]:sc.filter(c=>c.day!==action.day) },
        completedDays: { ...state.completedDays, [split]:sd.filter(d=>d!==action.day) },
      };
    case "RESET_SPLIT":
      return { ...state,
        completions:   { ...state.completions,   [split]:[] },
        completedDays: { ...state.completedDays, [split]:[] },
      };
    default: return state;
  }
}

function App() {
  const isStandalone = window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone===true;
  const [state, dispatch] = useReducer(reducer, null, () => {
    try { const s=localStorage.getItem("tl-state"); if(s) return JSON.parse(s); } catch {}
    return INITIAL_STATE;
  });
  useEffectApp(() => { localStorage.setItem("tl-state", JSON.stringify(state)); }, [state]);

  const [route, setRoute] = useStateApp(() => {
    try { const s=localStorage.getItem("tl-route"); if(s) return JSON.parse(s); } catch {}
    return { screen:"home" };
  });
  useEffectApp(() => { localStorage.setItem("tl-route", JSON.stringify(route)); }, [route]);

  const [tweaks, setTweaks] = useStateApp({ accent:"vermilion", variant:"paper", typePair:"serif-geist" });
  const [tweaksOn, setTweaksOn] = useStateApp(false);
  useEffectApp(() => {
    const h = e => { if(e.data?.type==="__activate_edit_mode") setTweaksOn(true); if(e.data?.type==="__deactivate_edit_mode") setTweaksOn(false); };
    window.addEventListener("message",h);
    window.parent.postMessage({type:"__edit_mode_available"},"*");
    return () => window.removeEventListener("message",h);
  },[]);

  const v = VARIANTS[tweaks.variant]||VARIANTS.paper;
  const p = TYPE_PAIRS[tweaks.typePair]||TYPE_PAIRS["serif-geist"];
  const cssVars = {
    "--paper":v.paper,"--ink":v.ink,"--ink-60":v.ink60,"--ink-30":v.ink30,
    "--rule":v.rule,"--accent":ACCENT_CHOICES[tweaks.accent]||ACCENT_CHOICES.vermilion,
    "--accent-tint":v.accentTint,"--success":"oklch(0.52 0.12 150)",
    "--font-display":p.display,"--font-body":p.body,"--font-mono":p.mono,
  };

  const navigate = r => setRoute(r);
  const renderScreen = () => {
    if (route.screen==="day") return <DayScreen state={state} dispatch={dispatch} navigate={navigate} dayId={route.dayId}/>;
    return <Dashboard state={state} dispatch={dispatch} navigate={navigate}/>;
  };

  if (isStandalone) {
    return (
      <div style={{ minHeight:"100vh", background:"var(--paper)", paddingTop:"env(safe-area-inset-top)", paddingBottom:"env(safe-area-inset-bottom)", ...cssVars }}>
        <div style={{ paddingTop:12 }}>{renderScreen()}</div>
      </div>
    );
  }

  return (
    <div style={{
      minHeight:"100vh",
      background: tweaks.variant==="ink"
        ? "radial-gradient(ellipse at top,oklch(0.22 0.01 260),oklch(0.12 0.01 260))"
        : "radial-gradient(ellipse at top,oklch(0.93 0.01 80),oklch(0.86 0.015 70))",
      display:"flex", alignItems:"center", justifyContent:"center", padding:"40px 20px", ...cssVars,
    }}>
      <IOSDevice width={390} height={844} dark={tweaks.variant==="ink"}>
        <div style={{ minHeight:"100%", background:"var(--paper)", paddingTop:54 }}>
          {renderScreen()}
        </div>
      </IOSDevice>
      {!tweaksOn && <div style={{ position:"fixed", bottom:20, left:20, fontFamily:"ui-monospace,monospace", fontSize:10, letterSpacing:0.14, textTransform:"uppercase", color:"rgba(0,0,0,0.4)", pointerEvents:"none" }}>Training Log</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  });
}
</script>

</body>
