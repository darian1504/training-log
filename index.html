<!-- ═══════════════════════════════════ COMPONENTS ═══════════════════════════════════ -->
<script type="text/babel">
const { useMemo } = React;

function RingStack({ progress, size = 260, strokeWidth = 9, gap = 3, startAngle = -90 }) {
  const center = size / 2;
  const outerR = center - strokeWidth / 2 - 2;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ display: "block" }}>
      {MUSCLE_GROUPS.map((g, i) => {
        const r = outerR - i * (strokeWidth + gap);
        const c = 2 * Math.PI * r;
        const done = Math.min(1, (progress[g] || 0) / WEEKLY_TARGETS[g]);
        return (
          <g key={g}>
            <circle cx={center} cy={center} r={r} fill="none" stroke="currentColor" strokeOpacity="0.08" strokeWidth={strokeWidth} />
            <circle
              cx={center} cy={center} r={r} fill="none"
              stroke={MG_COLORS[g]} strokeWidth={strokeWidth} strokeLinecap="round"
              strokeDasharray={`${c * done} ${c}`}
              transform={`rotate(${startAngle} ${center} ${center})`}
              style={{ transition: "stroke-dasharray 700ms cubic-bezier(.2,.8,.2,1)" }}
            />
          </g>
        );
      })}
    </svg>
  );
}

function GroupKey({ progress, style = {} }) {
  return (
    <div style={{
      display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: "6px 14px",
      fontFamily: "var(--font-mono)", fontSize: 10.5, letterSpacing: 0.06,
      textTransform: "uppercase", ...style,
    }}>
      {MUSCLE_GROUPS.map((g) => {
        const done = progress[g] || 0;
        const target = WEEKLY_TARGETS[g];
        return (
          <div key={g} style={{ display: "flex", alignItems: "center", gap: 6, color: "var(--ink-60)" }}>
            <span style={{ width: 6, height: 6, borderRadius: 999, background: MG_COLORS[g], flexShrink: 0 }} />
            <span style={{ flex: 1, color: "var(--ink)" }}>{MG_LABEL[g]}</span>
            <span style={{ color: "var(--ink-60)", fontVariantNumeric: "tabular-nums" }}>
              {done}<span style={{ opacity: 0.5 }}>/{target}</span>
            </span>
          </div>
        );
      })}
    </div>
  );
}

function ExerciseRow({ ex, checked, onToggle, dashed = false }) {
  return (
    <button onClick={onToggle} style={{
      width: "100%", textAlign: "left", padding: "14px 2px",
      background: "transparent", border: "none",
      borderTop: dashed ? "1px dashed var(--rule)" : "1px solid var(--rule)",
      cursor: "pointer", display: "flex", alignItems: "center", gap: 14,
      fontFamily: "var(--font-body)",
    }}>
      <span style={{
        width: 22, height: 22, borderRadius: 5,
        border: checked ? "none" : "1.5px solid var(--ink-30)",
        background: checked ? MG_COLORS[ex.group] : "transparent",
        display: "flex", alignItems: "center", justifyContent: "center",
        flexShrink: 0, transition: "all 180ms",
      }}>
        {checked && (
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
            <path d="M2 6.5l2.5 2.5L10 3.5" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        )}
      </span>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{
          fontFamily: "var(--font-display)", fontSize: 19, letterSpacing: -0.2,
          color: checked ? "var(--ink-60)" : "var(--ink)",
          textDecoration: checked ? "line-through" : "none",
          textDecorationThickness: "1px", lineHeight: 1.1,
        }}>{ex.name}</div>
        <div style={{
          fontFamily: "var(--font-mono)", fontSize: 10.5, letterSpacing: 0.08,
          color: "var(--ink-60)", textTransform: "uppercase", marginTop: 3,
          display: "flex", gap: 10, alignItems: "center",
        }}>
          <span style={{ color: MG_COLORS[ex.group] }}>◆ {MG_LABEL[ex.group]}</span>
          {dashed && <span style={{ color: "var(--ink-30)" }}>· ADDED</span>}
        </div>
      </div>
    </button>
  );
}

function Rule({ label, style = {} }) {
  return (
    <div style={{
      display: "flex", alignItems: "center", gap: 10,
      fontFamily: "var(--font-mono)", fontSize: 10, letterSpacing: 0.14,
      textTransform: "uppercase", color: "var(--ink-60)",
      margin: "24px 0 12px", ...style,
    }}>
      <span style={{ whiteSpace: "nowrap" }}>{label}</span>
      <span style={{ flex: 1, height: 1, background: "var(--rule)" }} />
    </div>
  );
}

function DayCard({ day, focus, completed, total, isCurrent, isDone, onClick }) {
  const pct = total ? completed / total : 0;
  return (
    <button onClick={onClick} style={{
      textAlign: "left", cursor: "pointer",
      background: isCurrent ? "var(--ink)" : "transparent",
      color: isCurrent ? "var(--paper)" : "var(--ink)",
      border: isCurrent ? "1px solid var(--ink)" : "1px solid var(--rule)",
      borderRadius: 0, padding: "14px 14px 16px",
      display: "flex", flexDirection: "column", gap: 4,
      fontFamily: "var(--font-body)",
    }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
        <div>
          <div style={{
            fontFamily: "var(--font-mono)", fontSize: 9.5, letterSpacing: 0.18,
            textTransform: "uppercase",
            color: isCurrent ? "rgba(255,255,255,0.6)" : "var(--ink-60)",
          }}>Day</div>
          <div style={{
            fontFamily: "var(--font-display)", fontSize: 34, lineHeight: 1,
            letterSpacing: -0.03, fontVariantNumeric: "tabular-nums",
          }}>{day}</div>
        </div>
        {isDone && (
          <span style={{
            fontFamily: "var(--font-mono)", fontSize: 9, letterSpacing: 0.18,
            textTransform: "uppercase",
            color: isCurrent ? "rgba(255,255,255,0.7)" : "var(--accent)",
            border: `1px solid ${isCurrent ? "rgba(255,255,255,0.35)" : "var(--accent)"}`,
            borderRadius: 2, padding: "2px 5px",
          }}>Done</span>
        )}
        {!isDone && isCurrent && (
          <span style={{
            fontFamily: "var(--font-mono)", fontSize: 9, letterSpacing: 0.18,
            textTransform: "uppercase", color: "var(--paper)",
            border: "1px solid rgba(255,255,255,0.4)", borderRadius: 2, padding: "2px 5px",
          }}>Today</span>
        )}
      </div>
      <div style={{ fontFamily: "var(--font-display)", fontSize: 15, letterSpacing: -0.1, lineHeight: 1.15, marginTop: 8 }}>{focus.title}</div>
      <div style={{
        fontFamily: "var(--font-mono)", fontSize: 10, letterSpacing: 0.08, textTransform: "uppercase",
        color: isCurrent ? "rgba(255,255,255,0.6)" : "var(--ink-60)", marginTop: 2,
      }}>{completed}/{total} · {Math.round(pct * 100)}%</div>
      <div style={{ height: 2, background: isCurrent ? "rgba(255,255,255,0.18)" : "var(--rule)", marginTop: 10, position: "relative" }}>
        <div style={{
          position: "absolute", left: 0, top: 0, bottom: 0, width: `${pct * 100}%`,
          background: isCurrent ? "var(--paper)" : "var(--accent)", transition: "width 400ms ease",
        }} />
      </div>
    </button>
  );
}

function TLButton({ children, onClick, variant = "ghost", style = {} }) {
  const base = {
    fontFamily: "var(--font-mono)", fontSize: 11, letterSpacing: 0.14,
    textTransform: "uppercase", padding: "10px 14px",
    border: "1px solid var(--ink)", borderRadius: 0,
    cursor: "pointer", display: "inline-flex", alignItems: "center", gap: 8,
    transition: "all 150ms",
  };
  const variants = {
    ghost: { background: "transparent", color: "var(--ink)" },
    solid: { background: "var(--ink)", color: "var(--paper)" },
    accent: { background: "var(--accent)", color: "#fff", border: "1px solid var(--accent)" },
  };
  return <button onClick={onClick} style={{ ...base, ...variants[variant], ...style }}>{children}</button>;
}

Object.assign(window, { RingStack, GroupKey, ExerciseRow, Rule, DayCard, TLButton });
</script>

<!-- ═══════════════════════════════════ SCREENS ═══════════════════════════════════ -->
<script type="text/babel">
const { useState, useEffect } = React;

function computeProgress(completions) {
  const p = { legs:0, back:0, chest:0, arms:0, shoulders:0, abs:0 };
  completions.forEach((c) => {
    const ex = exerciseById(c.id);
    p[ex.group] = (p[ex.group] || 0) + 1;
  });
  return p;
}

function Dashboard({ state, dispatch, navigate }) {
  const { completions } = state;
  const progress = computeProgress(completions);
  const totalDone = Object.values(progress).reduce((a, b) => a + b, 0);

  let currentDay = 4;
  for (let d = 1; d <= 4; d++) {
    const slots = DEFAULT_PLAN[d - 1];
    const doneCount = completions.filter((c) => c.day === d && c.slot < 1000).length;
    if (doneCount < slots.length) { currentDay = d; break; }
  }

  const today = new Date();
  const weekday = ["SUN","MON","TUE","WED","THU","FRI","SAT"][today.getDay()];
  const dateStr = `${weekday} · ${today.toLocaleDateString("en-US", { month: "short", day: "numeric" }).toUpperCase()}`;

  const expectedPct = ((currentDay - 1) / 4) * 100;
  const behind = MUSCLE_GROUPS.map((g) => {
    const target = WEEKLY_TARGETS[g];
    const pct = target ? (progress[g] / target) * 100 : 0;
    const missing = Math.max(0, target - progress[g]);
    if (missing === 0 || pct >= expectedPct) return null;
    const todayExtras = new Set(
      completions.filter((c) => c.day === currentDay && c.slot >= 1000).map((c) => c.id),
    );
    const pool = Object.values(EXERCISES)
      .filter((ex) => ex.group === g && !todayExtras.has(ex.id))
      .slice(0, 2);
    return { group: g, missing, suggestions: pool };
  }).filter(Boolean);

  return (
    <div style={{ padding: "8px 24px 120px", fontFamily: "var(--font-body)", color: "var(--ink)" }}>
      {/* Masthead */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", paddingTop: 8 }}>
        <div>
          <div style={{ fontFamily: "var(--font-mono)", fontSize: 10, letterSpacing: 0.18, textTransform: "uppercase", color: "var(--ink-60)" }}>{dateStr}</div>
          <div style={{ fontFamily: "var(--font-display)", fontSize: 42, lineHeight: 0.95, letterSpacing: -0.035, marginTop: 10, fontWeight: 400 }}>
            <span style={{ fontStyle: "italic" }}>Training</span> Log
          </div>
        </div>
      </div>

      {/* Ring Stack */}
      <div style={{ marginTop: 28, position: "relative", display: "flex", justifyContent: "center" }}>
        <div style={{ position: "relative", width: 260, height: 260 }}>
          <RingStack progress={progress} size={260} strokeWidth={9} gap={3} />
          <div style={{
            position: "absolute", inset: 0, display: "flex",
            flexDirection: "column", alignItems: "center", justifyContent: "center", textAlign: "center",
          }}>
            <div style={{ fontFamily: "var(--font-mono)", fontSize: 9.5, letterSpacing: 0.2, textTransform: "uppercase", color: "var(--ink-60)" }}>Week Volume</div>
            <div style={{ fontFamily: "var(--font-display)", fontSize: 68, lineHeight: 0.85, letterSpacing: -0.05, marginTop: 8, fontVariantNumeric: "tabular-nums", fontWeight: 400 }}>{totalDone}</div>
            <div style={{ fontFamily: "var(--font-mono)", fontSize: 10, letterSpacing: 0.12, color: "var(--ink-60)", marginTop: 2 }}>of {TOTAL_TARGET} sets</div>
          </div>
        </div>
      </div>

      {/* Group Key */}
      <div style={{ marginTop: 22 }}>
        <GroupKey progress={progress} />
      </div>

      {/* 4-day strip */}
      <Rule label={`Four-Day Split · ${currentDay <= 4 ? "Day " + currentDay + " on deck" : "Complete"}`} />
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
        {[1,2,3,4].map((d) => {
          const slots = DEFAULT_PLAN[d-1];
          const completed = completions.filter((c) => c.day === d && c.slot < 1000).length;
          const extras = completions.filter((c) => c.day === d && c.slot >= 1000).length;
          const isCurrent = d === currentDay;
          const isDone = completed >= slots.length;
          return (
            <DayCard key={d} day={d} focus={DAY_FOCUS[d-1]}
              completed={completed + extras} total={slots.length + extras}
              isCurrent={isCurrent} isDone={isDone}
              onClick={() => navigate({ screen: "day", dayId: d })}
            />
          );
        })}
      </div>

      {/* Catch-up */}
      {behind.length > 0 && (
        <>
          <Rule label="Catch-Up · Behind Pace" />
          <div style={{ border: "1px solid var(--accent)", background: "var(--accent-tint)", padding: "14px 14px 4px" }}>
            <div style={{ fontFamily: "var(--font-display)", fontSize: 17, letterSpacing: -0.15, lineHeight: 1.2 }}>
              You're trailing on <span style={{ color: "var(--accent)", fontStyle: "italic" }}>
                {behind.map((b,i) => (i === behind.length-1 && behind.length > 1 ? "and " : "") + MG_LABEL[b.group].toLowerCase()).join(", ")}
              </span>. Tap to add to Day {currentDay}.
            </div>
            {behind.map((b) => (
              <div key={b.group} style={{ marginTop: 12, paddingTop: 10, borderTop: "1px dashed var(--rule)" }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 8 }}>
                  <div style={{ fontFamily: "var(--font-mono)", fontSize: 10, letterSpacing: 0.12, textTransform: "uppercase", color: "var(--ink)", display: "flex", alignItems: "center", gap: 6 }}>
                    <span style={{ width:6, height:6, borderRadius:999, background: MG_COLORS[b.group] }} />
                    {MG_LABEL[b.group]}
                  </div>
                  <div style={{ fontFamily: "var(--font-mono)", fontSize: 10, letterSpacing: 0.1, color: "var(--ink-60)" }}>+{b.missing} needed</div>
                </div>
                <div style={{ display: "flex", gap: 8, flexWrap: "wrap", paddingBottom: 10 }}>
                  {b.suggestions.map((ex) => (
                    <button key={ex.id}
                      onClick={() => dispatch({ type: "ADD_EXTRA", day: currentDay, id: ex.id })}
                      style={{
                        fontFamily: "var(--font-body)", fontSize: 12.5, padding: "6px 10px",
                        background: "var(--paper)", color: "var(--ink)",
                        border: "1px solid var(--ink)", borderRadius: 0, cursor: "pointer",
                      }}>
                      + {ex.name}
                    </button>
                  ))}
                </div>
              </div>
            ))}
          </div>
        </>
      )}

      {/* Volume By Group */}
      <Rule label="Volume By Group" />
      <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
        {MUSCLE_GROUPS.map((g) => {
          const target = WEEKLY_TARGETS[g];
          const done = progress[g];
          const pct = target ? done / target : 0;
          const onTrack = pct * 100 >= ((currentDay - 1) / 4) * 100;
          return (
            <div key={g}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", fontFamily: "var(--font-body)", fontSize: 14 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <span style={{ width:8, height:8, borderRadius:999, background: MG_COLORS[g] }} />
                  <span style={{ fontFamily: "var(--font-display)", fontSize: 17, letterSpacing: -0.1 }}>{MG_LABEL[g]}</span>
                </div>
                <div style={{ fontFamily: "var(--font-mono)", fontSize: 11, letterSpacing: 0.08, color: "var(--ink-60)", fontVariantNumeric: "tabular-nums" }}>
                  {done}/{target}
                  <span style={{ marginLeft: 8, color: onTrack ? "var(--success)" : "var(--accent)" }}>
                    {onTrack ? "ON PACE" : "LAGGING"}
                  </span>
                </div>
              </div>
              <div style={{ height: 6, background: "var(--rule)", marginTop: 6, position: "relative" }}>
                <div style={{ position: "absolute", inset: 0, width: `${Math.min(1, pct) * 100}%`, background: MG_COLORS[g], transition: "width 500ms ease" }} />
                <div style={{ position: "absolute", top: -2, bottom: -2, left: `${((currentDay - 1) / 4) * 100}%`, width: 1, background: "var(--ink)", opacity: 0.6 }} />
              </div>
            </div>
          );
        })}
      </div>

      {/* Footer */}
      <div style={{
        marginTop: 32, paddingTop: 16, borderTop: "1px solid var(--ink)",
        display: "flex", justifyContent: "space-between", alignItems: "center",
        fontFamily: "var(--font-mono)", fontSize: 9.5, letterSpacing: 0.18,
        textTransform: "uppercase", color: "var(--ink-60)",
      }}>
        <span />
        <span onClick={() => dispatch({ type: "RESET_WEEK" })} style={{ cursor: "pointer", borderBottom: "1px solid var(--ink-60)" }}>Reset Week</span>
      </div>
    </div>
  );
}

function DayScreen({ state, dispatch, navigate, dayId }) {
  const day = dayId;
  const slots = DEFAULT_PLAN[day-1];
  const { completions } = state;
  const plannedDone = new Set(completions.filter((c) => c.day === day && c.slot < 1000).map((c) => c.slot));
  const extras = completions.filter((c) => c.day === day && c.slot >= 1000).sort((a,b) => a.slot - b.slot);
  const extraIds = new Set(extras.map((c) => c.id));

  const totalCount = slots.length + extras.length;
  const doneCount = plannedDone.size + extras.length;
  const pct = totalCount ? doneCount / totalCount : 0;
  const focus = DAY_FOCUS[day-1];

  const todayIds = new Set(slots);
  const alts = {};
  MUSCLE_GROUPS.forEach((g) => alts[g] = []);
  Object.values(EXERCISES).forEach((ex) => { if (!todayIds.has(ex.id)) alts[ex.group].push(ex); });

  return (
    <div style={{ padding: "8px 24px 120px", fontFamily: "var(--font-body)", color: "var(--ink)" }}>
      {/* Header */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", paddingTop: 4 }}>
        <button onClick={() => navigate({ screen: "home" })} style={{
          background: "var(--paper)", cursor: "pointer",
          border: "1px solid var(--ink)",
          fontFamily: "var(--font-mono)", fontSize: 10.5, letterSpacing: 0.16,
          textTransform: "uppercase", color: "var(--ink)", padding: "6px 10px",
        }}>← Back to Log</button>
        <div style={{ display: "flex", gap: 8, fontFamily: "var(--font-mono)", fontSize: 10.5, letterSpacing: 0.14, textTransform: "uppercase", color: "var(--ink-60)" }}>
          {day > 1 && <span onClick={() => navigate({ screen: "day", dayId: day-1 })} style={{ cursor: "pointer" }}>‹ Prev</span>}
          {day < 4 && <span onClick={() => navigate({ screen: "day", dayId: day+1 })} style={{ cursor: "pointer" }}>Next ›</span>}
        </div>
      </div>

      {/* Folio */}
      <div style={{ marginTop: 18, display: "flex", alignItems: "flex-end", gap: 14 }}>
        <div style={{ fontFamily: "var(--font-display)", fontSize: 140, lineHeight: 0.82, letterSpacing: -0.06, fontVariantNumeric: "tabular-nums", fontWeight: 400, fontStyle: "italic" }}>{day}</div>
        <div style={{ paddingBottom: 12, flex: 1 }}>
          <div style={{ fontFamily: "var(--font-mono)", fontSize: 10, letterSpacing: 0.18, textTransform: "uppercase", color: "var(--ink-60)" }}>Day {day} of Four</div>
          <div style={{ fontFamily: "var(--font-display)", fontSize: 22, letterSpacing: -0.15, marginTop: 4, lineHeight: 1.1 }}>{focus.title}</div>
          <div style={{ fontFamily: "var(--font-body)", fontSize: 12.5, color: "var(--ink-60)", marginTop: 3, fontStyle: "italic" }}>{focus.sub}</div>
        </div>
      </div>

      {/* Progress meter */}
      <div style={{ marginTop: 16, display: "flex", alignItems: "center", gap: 12 }}>
        <div style={{ flex: 1, height: 2, background: "var(--rule)", position: "relative" }}>
          <div style={{ position: "absolute", inset: 0, width: `${pct * 100}%`, background: "var(--ink)", transition: "width 400ms ease" }} />
        </div>
        <div style={{ fontFamily: "var(--font-mono)", fontSize: 11, letterSpacing: 0.1, fontVariantNumeric: "tabular-nums" }}>{doneCount}/{totalCount}</div>
      </div>

      {/* Prescribed */}
      <Rule label="Prescribed" />
      <div>
        {slots.map((id, slot) => {
          const ex = exerciseById(id);
          return (
            <ExerciseRow key={`${slot}-${id}`} ex={ex} checked={plannedDone.has(slot)}
              onToggle={() => dispatch({ type: plannedDone.has(slot) ? "UNCHECK" : "CHECK", day, slot, id })}
            />
          );
        })}
        {extras.map((c) => (
          <ExerciseRow key={`e-${c.slot}`} ex={exerciseById(c.id)} checked dashed
            onToggle={() => dispatch({ type: "REMOVE_EXTRA", day, slot: c.slot })}
          />
        ))}
        <div style={{ borderTop: "1px solid var(--ink)" }} />
      </div>

      {/* Catalog */}
      <Rule label="Catalog · Tap to Log Extra" />
      <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
        {MUSCLE_GROUPS.map((g) => {
          const list = alts[g];
          if (list.length === 0) return null;
          return (
            <div key={g}>
              <div style={{ fontFamily: "var(--font-mono)", fontSize: 10, letterSpacing: 0.16, textTransform: "uppercase", display: "flex", alignItems: "center", gap: 6, color: "var(--ink)", marginBottom: 6 }}>
                <span style={{ width:6, height:6, borderRadius:999, background: MG_COLORS[g] }} />
                {MG_LABEL[g]}
              </div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                {list.map((ex) => {
                  const checked = extraIds.has(ex.id);
                  return (
                    <button key={ex.id}
                      onClick={() => dispatch({ type: checked ? "REMOVE_EXTRA_BY_ID" : "ADD_EXTRA", day, id: ex.id })}
                      style={{
                        fontFamily: "var(--font-body)", fontSize: 12.5, padding: "5px 10px",
                        background: checked ? "var(--ink)" : "transparent",
                        color: checked ? "var(--paper)" : "var(--ink)",
                        border: "1px solid var(--ink)", borderRadius: 0, cursor: "pointer",
                      }}>
                      {checked ? "✓ " : "+ "}{ex.name}
                    </button>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>

      <div style={{ marginTop: 24, display: "flex", gap: 10 }}>
        <TLButton onClick={() => dispatch({ type: "RESET_DAY", day })}>Reset Day</TLButton>
      </div>
    </div>
  );
}

Object.assign(window, { Dashboard, DayScreen, computeProgress });
</script>

<!-- ═══════════════════════════════════ APP ═══════════════════════════════════ -->
<script type="text/babel">
const { useReducer, useEffect: useEffectApp, useState: useStateApp } = React;

const ACCENT_CHOICES = {
  vermilion: "oklch(0.58 0.20 28)",
  ink:       "oklch(0.22 0.02 260)",
  olive:     "oklch(0.55 0.11 115)",
  cobalt:    "oklch(0.48 0.17 258)",
};

const VARIANTS = {
  paper: { paper: "oklch(0.968 0.008 78)", ink: "oklch(0.18 0.015 60)", ink60: "oklch(0.45 0.012 60)", ink30: "oklch(0.72 0.008 60)", rule: "oklch(0.88 0.01 75)", accentTint: "oklch(0.95 0.03 28 / 0.6)" },
  ink:   { paper: "oklch(0.16 0.012 260)", ink: "oklch(0.95 0.008 80)", ink60: "oklch(0.68 0.012 80)", ink30: "oklch(0.42 0.012 80)", rule: "oklch(0.28 0.012 260)", accentTint: "oklch(0.22 0.04 28 / 0.5)" },
  court: { paper: "oklch(0.94 0.015 95)", ink: "oklch(0.22 0.04 160)", ink60: "oklch(0.48 0.03 160)", ink30: "oklch(0.72 0.015 160)", rule: "oklch(0.82 0.02 95)", accentTint: "oklch(0.92 0.04 28 / 0.6)" },
};

const TYPE_PAIRS = {
  "serif-geist": { display: `"Instrument Serif", "Times New Roman", serif`, body: `"Geist", "Helvetica Neue", system-ui, sans-serif`, mono: `"Geist Mono", ui-monospace, monospace` },
  "serif-mono":  { display: `"Instrument Serif", serif`, body: `"JetBrains Mono", ui-monospace, monospace`, mono: `"JetBrains Mono", ui-monospace, monospace` },
  "editorial":   { display: `"EB Garamond", Georgia, serif`, body: `"EB Garamond", Georgia, serif`, mono: `"IBM Plex Mono", ui-monospace, monospace` },
};

function reducer(state, action) {
  switch (action.type) {
    case "CHECK": {
      if (state.completions.some(c => c.day === action.day && c.slot === action.slot)) return state;
      return { ...state, completions: [...state.completions, { day: action.day, slot: action.slot, id: action.id }] };
    }
    case "UNCHECK":
      return { ...state, completions: state.completions.filter(c => !(c.day === action.day && c.slot === action.slot)) };
    case "ADD_EXTRA": {
      const used = state.completions.filter(c => c.day === action.day && c.slot >= 1000).map(c => c.slot);
      let slot = 1000;
      while (used.includes(slot)) slot++;
      return { ...state, completions: [...state.completions, { day: action.day, slot, id: action.id }] };
    }
    case "REMOVE_EXTRA":
      return { ...state, completions: state.completions.filter(c => !(c.day === action.day && c.slot === action.slot)) };
    case "REMOVE_EXTRA_BY_ID":
      return { ...state, completions: state.completions.filter(c => !(c.day === action.day && c.slot >= 1000 && c.id === action.id)) };
    case "RESET_DAY":
      return { ...state, completions: state.completions.filter(c => c.day !== action.day) };
    case "RESET_WEEK":
      return { ...state, completions: [] };
    default: return state;
  }
}

function TweaksPanel({ tweaks, update }) {
  const labelSty = { fontFamily: "ui-monospace, monospace", fontSize: 9.5, letterSpacing: 0.14, textTransform: "uppercase", color: "rgba(0,0,0,0.55)", marginBottom: 6 };
  const btnSty = (active) => ({
    padding: "6px 10px",
    border: `1px solid ${active ? "#000" : "rgba(0,0,0,0.25)"}`,
    background: active ? "#000" : "transparent",
    color: active ? "#fff" : "#000",
    fontFamily: "ui-monospace, monospace", fontSize: 10.5,
    letterSpacing: 0.08, textTransform: "uppercase",
    cursor: "pointer", borderRadius: 0,
  });
  return (
    <div style={{
      position: "fixed", right: 20, bottom: 20, width: 280,
      background: "rgba(255,255,255,0.96)", border: "1px solid rgba(0,0,0,0.2)",
      padding: "16px 16px 14px", backdropFilter: "blur(8px)",
      fontFamily: "ui-monospace, monospace", zIndex: 1000,
    }}>
      <div style={{ fontSize: 11, letterSpacing: 0.2, textTransform: "uppercase", marginBottom: 14, display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
        <span>Tweaks</span>
        <span style={{ fontSize: 9, opacity: 0.5 }}>Training Log</span>
      </div>
      <div style={labelSty}>Variant</div>
      <div style={{ display: "flex", gap: 6, marginBottom: 14 }}>
        {["paper","ink","court"].map(v => (
          <button key={v} style={btnSty(tweaks.variant === v)} onClick={() => update("variant", v)}>{v}</button>
        ))}
      </div>
      <div style={labelSty}>Accent</div>
      <div style={{ display: "flex", gap: 6, marginBottom: 14 }}>
        {Object.keys(ACCENT_CHOICES).map(a => (
          <button key={a} style={btnSty(tweaks.accent === a)} onClick={() => update("accent", a)}>{a}</button>
        ))}
      </div>
      <div style={labelSty}>Type Pair</div>
      <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
        {Object.keys(TYPE_PAIRS).map(t => (
          <button key={t} style={btnSty(tweaks.typePair === t)} onClick={() => update("typePair", t)}>{t}</button>
        ))}
      </div>
    </div>
  );
}

function App() {
  const [state, dispatch] = useReducer(reducer, { completions: INITIAL_COMPLETIONS });

  const [route, setRoute] = useStateApp(() => {
    try { const s = localStorage.getItem("tl-route"); if (s) return JSON.parse(s); } catch {}
    return { screen: "home" };
  });
  useEffectApp(() => { localStorage.setItem("tl-route", JSON.stringify(route)); }, [route]);

  const [tweaks, setTweaks] = useStateApp({ accent: "vermilion", variant: "paper", typePair: "serif-geist" });
  const [tweaksOn, setTweaksOn] = useStateApp(false);

  useEffectApp(() => {
    const handler = (e) => {
      if (e.data?.type === "__activate_edit_mode") setTweaksOn(true);
      if (e.data?.type === "__deactivate_edit_mode") setTweaksOn(false);
    };
    window.addEventListener("message", handler);
    window.parent.postMessage({ type: "__edit_mode_available" }, "*");
    return () => window.removeEventListener("message", handler);
  }, []);

  const updateTweak = (k, v) => {
    setTweaks(prev => ({ ...prev, [k]: v }));
    window.parent.postMessage({ type: "__edit_mode_set_keys", edits: { [k]: v } }, "*");
  };

  const variant = VARIANTS[tweaks.variant] || VARIANTS.paper;
  const pair = TYPE_PAIRS[tweaks.typePair] || TYPE_PAIRS["serif-geist"];
  const accent = ACCENT_CHOICES[tweaks.accent] || ACCENT_CHOICES.vermilion;

  const cssVars = {
    "--paper": variant.paper, "--ink": variant.ink, "--ink-60": variant.ink60,
    "--ink-30": variant.ink30, "--rule": variant.rule, "--accent": accent,
    "--accent-tint": variant.accentTint, "--success": "oklch(0.52 0.12 150)",
    "--font-display": pair.display, "--font-body": pair.body, "--font-mono": pair.mono,
  };

  const navigate = (r) => setRoute(r);

  const renderScreen = () => {
    if (route.screen === "day") return <DayScreen state={state} dispatch={dispatch} navigate={navigate} dayId={route.dayId} />;
    return <Dashboard state={state} dispatch={dispatch} navigate={navigate} />;
  };

  return (
    <div style={{
      minHeight: "100vh",
      background: tweaks.variant === "ink"
        ? "radial-gradient(ellipse at top, oklch(0.22 0.01 260), oklch(0.12 0.01 260))"
        : "radial-gradient(ellipse at top, oklch(0.93 0.01 80), oklch(0.86 0.015 70))",
      display: "flex", alignItems: "center", justifyContent: "center",
      padding: "40px 20px", ...cssVars,
    }}>
      <IOSDevice width={390} height={844} dark={tweaks.variant === "ink"}>
        <div style={{ minHeight: "100%", background: "var(--paper)", paddingTop: 54 }}>
          {renderScreen()}
        </div>
      </IOSDevice>

      {tweaksOn && <TweaksPanel tweaks={tweaks} update={updateTweak} />}

      {!tweaksOn && (
        <div style={{
          position: "fixed", bottom: 20, left: 20,
          fontFamily: "ui-monospace, monospace", fontSize: 10, letterSpacing: 0.14,
          textTransform: "uppercase", color: "rgba(0,0,0,0.4)", pointerEvents: "none",
        }}>Training Log · toggle Tweaks ↗</div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(r => console.log('SW registered:', r.scope))
      .catch(e => console.log('SW failed:', e));
  });
}
</script>

</body>
